<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>付东淏 | Personal Homepage</title>
    <meta
      name="description"
      content="付东淏的中英双语个人主页，展示教育背景、科研成果、专利论文、竞赛项目与获奖情况。"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&family=Noto+Sans+SC:wght@400;500;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="page-shell">
      <header class="hero">
        <div class="hero__glow hero__glow--one"></div>
        <div class="hero__glow hero__glow--two"></div>
        <nav class="topbar">
          <div class="brand">Fudonghao / Portfolio</div>
          <div class="lang-switch" aria-label="Language switcher">
            <button class="lang-switch__button is-active" data-lang="zh">中文</button>
            <button class="lang-switch__button" data-lang="en">EN</button>
          </div>
        </nav>
        <section class="hero__content">
          <div class="hero__text">
            <p class="eyebrow" data-i18n="eyebrow"></p>
            <h1 data-i18n="name"></h1>
            <p class="hero__lead" data-i18n="headline"></p>
            <p class="hero__summary" data-i18n="summary"></p>
            <div class="hero__actions">
              <a class="button button--primary" href="#contact" data-i18n="ctaContact"></a>
              <a class="button button--ghost" href="#research" data-i18n="ctaResearch"></a>
            </div>
            <ul class="hero__chips" id="hero-chips"></ul>
          </div>
          <div class="hero__portrait">
            <div class="portrait-card">
              <img src="./assets/profile-photo.png" alt="付东淏照片" />
            </div>
            <div class="hero__facts" id="hero-facts"></div>
          </div>
        </section>
      </header>

      <main>
        <section class="section" id="education">
          <div class="section__heading">
            <p class="section__eyebrow" data-i18n="educationEyebrow"></p>
            <h2 data-i18n="educationTitle"></h2>
          </div>
          <div class="education-card">
            <div>
              <p class="education-card__school" data-i18n="school"></p>
              <p class="education-card__college" data-i18n="college"></p>
            </div>
            <p class="education-card__period" data-i18n="educationPeriod"></p>
          </div>
          <div class="stats-grid" id="education-stats"></div>
          <div class="course-panel">
            <h3 data-i18n="courseworkTitle"></h3>
            <p id="coursework-text"></p>
          </div>
        </section>

        <section class="section" id="honors">
          <div class="section__heading">
            <p class="section__eyebrow" data-i18n="honorsEyebrow"></p>
            <h2 data-i18n="honorsTitle"></h2>
          </div>
          <div class="grid grid--two">
            <article class="panel">
              <h3 data-i18n="honorsListTitle"></h3>
              <ul class="bullet-list" id="honors-list"></ul>
            </article>
            <article class="panel">
              <h3 data-i18n="awardsTitle"></h3>
              <ul class="bullet-list" id="awards-list"></ul>
            </article>
          </div>
        </section>

        <section class="section" id="research">
          <div class="section__heading">
            <p class="section__eyebrow" data-i18n="researchEyebrow"></p>
            <h2 data-i18n="researchTitle"></h2>
          </div>
          <div class="cards" id="research-cards"></div>
        </section>

        <section class="section" id="projects">
          <div class="section__heading">
            <p class="section__eyebrow" data-i18n="projectsEyebrow"></p>
            <h2 data-i18n="projectsTitle"></h2>
          </div>
          <div class="cards" id="project-cards"></div>
        </section>

        <section class="section" id="contact">
          <div class="section__heading">
            <p class="section__eyebrow" data-i18n="contactEyebrow"></p>
            <h2 data-i18n="contactTitle"></h2>
          </div>
          <div class="contact-grid">
            <article class="panel">
              <p class="contact-copy" data-i18n="contactCopy"></p>
            </article>
            <article class="panel">
              <ul class="contact-list" id="contact-list"></ul>
            </article>
          </div>
        </section>
      </main>
    </div>

    <script src="./script.js"></script>
  </body>
</html>
